name: Build & Release

on:
  push:
    branches: [ rev ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create local.properties
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
            echo "storeFile=keystore.jks" > key.properties
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> key.properties
            echo "storePassword=${{ secrets.KEY_STORE_PASSWORD }}" >> key.properties
            echo "keyPassword=${{ secrets.KEY_STORE_PASSWORD }}" >> key.properties
          else
            keytool -genkeypair -v -keystore debug.jks -keyalg RSA -keysize 2048 -validity 10000 -alias debug -storepass debug123 -keypass debug123 -dname "CN=Debug,O=Debug,C=US"
            echo "storeFile=debug.jks" > key.properties
            echo "keyAlias=debug" >> key.properties
            echo "storePassword=debug123" >> key.properties
            echo "keyPassword=debug123" >> key.properties
          fi

      - name: Build Release APK
        run: |
          chmod +x ./gradlew
          ./gradlew :tv:assembleRelease --stacktrace

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: tv/build/outputs/apk/release/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: APK
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.apk
          generate_release_notes: true
